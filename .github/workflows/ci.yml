name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Universal release build
        run: swift build -c release --arch arm64 --arch x86_64 --product CodexPulseApp

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Test
        run: swift test
      - name: Universal release build
        run: swift build -c release --arch arm64 --arch x86_64 --product CodexPulseApp
      - name: Validate release scripts
        run: zsh -n refresh_codex_pulse_app.sh scripts/*.sh

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Test
        run: swift test
      - name: Package
        run: ./scripts/package_release.sh "${GITHUB_REF_NAME#v}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.zip \
            dist/*.sha256 \
            --generate-notes \
            --title "Codex Pulse ${GITHUB_REF_NAME#v}"
